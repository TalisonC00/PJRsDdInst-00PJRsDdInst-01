    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --primary: #FF4B5C; --sky: #BAE6FD; --card: #FFFFFF; --text-main: #1E293B; --text-sub: #64748B; --money: #10B981; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); }}
        .loading {opacity: 0.7; pointer-events: none; cursor: not-allowed;}
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--sky); margin: 0; padding: 0; overflow: hidden; touch-action: manipulation; color: var(--text-main); }
        .header { background: #fff; padding: 15px 16px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.03); position: relative; z-index: 100; }
        .header h3 { margin: 0; font-size: 18px; color: var(--primary) !important; font-weight: 800; }
        #info { font-size: 10px; font-weight: 800; color: #000; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; display: block; }

        .aba { display: none; width: 100%; height: calc(100vh - 155px); overflow-y: auto; padding-bottom: 50px; -webkit-overflow-scrolling: touch; }
        .ativa { display: block; }
        .card { background: var(--card); padding: 20px; margin: 16px; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); }

        /* MAPA */
        .mapa-card { background: var(--card); margin: 16px; border-radius: 28px; height: calc(100% - 32px); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        #svg-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #fff; touch-action: auto !important; }
        path { fill: #F1F5F9; stroke: #fff; stroke-width: 0.8; transition: 0.5s; cursor: pointer; }
        
        /* Cores Regiões */
        .visitado[id^="BRAC"], .visitado[id^="BRAM"], .visitado[id^="BRRR"], .visitado[id^="BRRO"], .visitado[id^="BRPA"], .visitado[id^="BRAP"], .visitado[id^="BRTO"] { fill: #22C55E !important; }
        .visitado[id^="BRMA"], .visitado[id^="BRPI"], .visitado[id^="BRCE"], .visitado[id^="BRRN"], .visitado[id^="BRPB"], .visitado[id^="BRPE"], .visitado[id^="BRAL"], .visitado[id^="BRSE"], .visitado[id^="BRBA"] { fill: #FACC15 !important; }
        .visitado[id^="BRMT"], .visitado[id^="BRMS"], .visitado[id^="BRGO"], .visitado[id^="BRDF"] { fill: #FB923C !important; }
        .visitado[id^="BRMG"], .visitado[id^="BRSP"], .visitado[id^="BRRJ"], .visitado[id^="BRES"] { fill: #EC4899 !important; }
        .visitado[id^="BRPR"], .visitado[id^="BRSC"], .visitado[id^="BRRS"] { fill: #A855F7 !important; }

        /* TIMELINE */
        .timeline-container { padding: 10px 5px; position: relative; }
        .timeline-line { position: absolute; left: 33px; top: 60px; bottom: 20px; width: 3px; background: rgba(255,255,255,0.8); z-index: 0; border-radius: 10px; }
        .timeline-item { display: flex; gap: 15px; margin-bottom: 25px; position: relative; z-index: 2; margin-left: 20px; margin-right: 16px; }
        .t-dot { min-width: 14px; height: 14px; background: var(--primary); border: 3px solid #fff; border-radius: 50%; margin-top: 6px; z-index: 3; box-shadow: 0 0 0 2px rgba(255,75,92,0.1); }
        .t-card { background: #fff; padding: 18px; border-radius: 24px; flex: 1; box-shadow: 0 8px 25px rgba(0,0,0,0.04); border: 1px solid #f8fafc; }

        /* GASTOS */
        .resumo-uf-card { background: #fff; border-radius: 24px; padding: 24px; margin-bottom: 24px; border: 1.5px solid #F1F5F9; }
        .uf-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f8fafc; padding-bottom: 12px; margin-bottom: 12px; font-weight: 800; font-size: 16px; }
        .gasto-entry { padding: 20px 0; border-bottom: 1px solid #f8fafc; }
        .pill { background: #F8FAFC; padding: 6px 10px; border-radius: 10px; font-size: 10px; font-weight: 700; color: var(--text-sub); display: flex; align-items: center; gap: 4px; border: 1px solid #eee; }

        /* CONQUISTAS */
        .badge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; justify-items: center; }
        .badge { display: flex; flex-direction: column; align-items: center; width: 80px; opacity: 0.15; filter: grayscale(1); transition: 0.4s; cursor: pointer; }
        .badge.active { opacity: 1; filter: grayscale(0); transform: scale(1.05); }
        .b-icon { width: 52px; height: 52px; background: #F1F5F9; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 6px; }
        .badge-name { font-size: 9px; font-weight: 800; color: var(--text-sub); text-align: center; text-transform: uppercase; }

        /* FORMULÁRIO */
        input, select { width: 100%; padding: 14px; border-radius: 14px; border: 1.5px solid #F1F5F9; font-family: inherit; background: #F8FAFC; box-sizing: border-box; }
        label { font-size: 10px; font-weight: 800; color: var(--text-sub); text-transform: uppercase; margin: 12px 0 4px 4px; display: block; }
        .btn-acao { background: var(--money); color: #fff; border: none; padding: 16px; border-radius: 18px; width: 100%; font-weight: 800; margin-top: 15px; cursor: pointer; }

        /* POP-UP E MODAIS */
        #photo-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); background: #fff; padding: 24px; border-radius: 32px; box-shadow: 0 25px 60px rgba(0,0,0,0.3); z-index: 2100; width: 90%; max-width: 340px; opacity: 0; visibility: hidden; transition: 0.3s; }
        #photo-popup.show { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }
        .popup-scroll { max-height: 480px; overflow-y: auto; text-align: left; }
        .carousel-fotos { position: relative; width: 100%; overflow: hidden; border-radius: 20px; margin: 10px 0; height: 180px; background: #f1f5f9; }
        .track-fotos { display: flex; transition: transform 0.4s ease; height: 100%; }
        .img-slide { min-width: 100%; height: 100%; object-fit: cover; }
        .close-popup { position: absolute; top: 12px; right: 12px; background: var(--primary); color: white; border: none; border-radius: 50%; width: 30px; height: 30px; font-weight: bold; display: flex; align-items: center; justify-content: center; z-index: 3000; cursor: pointer; }

        /* MENU NAV */
        .menu-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; display: flex; height: 55px; border-top-left-radius: 28px; border-top-right-radius: 28px; z-index: 1000; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); }
        .btn-aba { flex: 1; border: none; background: none; font-size: 18px; color: #CBD5E1; cursor: pointer; outline: none; transition: 0.3s; -webkit-tap-highlight-color: transparent; }
        .btn-aba.active { color: var(--primary); transform: translateY(-5px); }
    </style>
</head>

    function gerenciarAuth() {
    const btn = document.getElementById('btn-auth-principal');
    const containerErro = document.getElementById('auth-erro-container');
    const email = document.getElementById('auth-email').value;
    const senha = document.getElementById('auth-senha').value;

    // 1. Resetar estado de erro
    containerErro.style.display = 'none';

    // 2. Validações Locais Básicas
    if (!email || !senha) return exibirErroAuth("Preencha todos os campos.");
    if (!email.includes('@')) return exibirErroAuth("E-mail inválido.");

    // 3. Ativar Estado de Carregamento
    btn.classList.add('loading');
    const textoOriginal = btn.innerText;
    btn.innerText = modoCadastro ? "Criando conta..." : "Verificando...";

    if (modoCadastro) {
        // --- FLUXO DE CADASTRO ---
        firebase.auth().createUserWithEmailAndPassword(email, senha)
            .then((userCredential) => {
                // SUCESSO ABSOLUTO: Avança para o perfil
                mostrarAlerta("Conta criada! Complete seu perfil.", "🚀");
                trocarAba('cadastro', null);
            })
            .catch((error) => {
                // ERRO: Permanece na tela de login
                exibirErroAuth(traduzirErro(error.code));
            })
            .finally(() => {
                // Restaurar botão independente do resultado
                btn.classList.remove('loading');
                btn.innerText = textoOriginal;
            });

    } else {
        // --- FLUXO DE LOGIN ---
        firebase.auth().signInWithEmailAndPassword(email, senha)
            .then((userCredential) => {
                // SUCESSO: Verifica se já tem o perfil social pronto
                verificarPerfilExistente(userCredential.user.uid);
            })
            .catch((error) => {
                // ERRO: Permanece na tela de login
                exibirErroAuth(traduzirErro(error.code));
            })
            .finally(() => {
                btn.classList.remove('loading');
                btn.innerText = textoOriginal;
            });
    }
}
    
    function tratarErrosAuth(error) {
    let mensagem = "Ocorreu um erro inesperado.";
    
    switch (error.code) {
        case 'auth/email-already-in-use':
            mensagem = "Este e-mail já está sendo usado por outra pessoa.";
            break;
        case 'auth/invalid-email':
            mensagem = "O formato do e-mail não parece correto.";
            break;
        case 'auth/user-not-found':
            mensagem = "Não encontramos nenhuma conta com este e-mail.";
            break;
        case 'auth/wrong-password':
            mensagem = "A senha está incorreta. Tente novamente.";
            break;
        case 'auth/weak-password':
            mensagem = "Escolha uma senha mais forte (mínimo 6 caracteres).";
            break;
    }
    mostrarAlerta(mensagem, "❌");
}

    function carregarPerfil(uidDestino) {
    // 1. Limpeza de Segurança: Desliga ouvintes do perfil anterior
    if (uidSendoVisualizado) {
        database.ref(`usuarios/${uidSendoVisualizado}/viagens`).off();
        database.ref(`usuarios/${uidSendoVisualizado}/conquistas_vistas`).off();

    // 2. Define o novo alvo e limpa o mapa visualmente
    uidSendoVisualizado = uidDestino;
    document.querySelectorAll('#mapa-svg-real path').forEach(p => p.classList.remove('visitado'));

    // 3. Busca dados do perfil alvo para ajustar a interface
    database.ref(`usuarios/${uidDestino}/perfil`).once('value').then(snap => {
        const perfilAlvo = snap.val();
        if(!perfilAlvo) return;

        // Atualiza o cabeçalho com o username do dono do mapa
        const infoHeader = document.getElementById('info');
        if(infoHeader) infoHeader.innerText = `@${perfilAlvo.username.toUpperCase()}`;

        // 4. Inicia a escuta em tempo real das viagens deste perfil
        database.ref(`usuarios/${uidDestino}/viagens`).on('value', (snapshot) => {
            dbGlobal = snapshot.val() || {};
            
            // Pinta os estados no mapa e atualiza as abas
            atualizarInterface(); 
            
            // Se estou no meu perfil, rodo tudo. Se for de outro, apenas o básico.
            if (uidDestino === usuarioLogado.uid) {

   let filaDeConquistas = [];

function verificarNovasConquistas() {
    const metas = [
        {id: 'm1', n:1, l:'Início da Jornada', i:'🌱'}, 
        {id: 'm5', n:5, l:'Exploradores Estaduais', i:'🏃'}, 
        {id: 'm10', n:10, l:'Casal Aventureiro', i:'⭐'}, 
        {id: 'm20', n:20, l:'Casal Explorador', i:'🔥'}, 
        {id: 'm26', n:26, l:'Conquistadores do Brasil', i:'👑'}
    ];
    
    const visitados = Object.keys(dbGlobal || {});
    let novasNestaRodada = [];

    // Lê o que está salvo no celular
    const celebradosNoHistorico = JSON.parse(localStorage.getItem('conquistas_vistas') || "[]");

    // 1. Verifica Metas Numéricas
    metas.forEach(m => {
        if (visitados.length >= m.n && !celebradosNoHistorico.includes(m.id)) {
            novasNestaRodada.push({nome: m.l, icone: m.i, id: m.id});
        }
    });
    
    // 2. Verifica Meta de Praia
    let temPraia = false; 
    for(let u in dbGlobal) { 
        for(let id in dbGlobal[u]) { 
            if(dbGlobal[u][id].praia) temPraia = true; 
        } 
    }
    if (temPraia && !celebradosNoHistorico.includes('praia')) {
        novasNestaRodada.push({nome: '🏖️ Pé na Areia', icone: '🏖️', id: 'praia'});
    }

    // Se houver novas, adiciona na fila e salva na nuvem e local
    if (novasNestaRodada.length > 0) {
        filaDeConquistas = [...filaDeConquistas, ...novasNestaRodada];
        
        const novoHistorico = [...celebradosNoHistorico, ...novasNestaRodada.map(n => n.id)];
        
        // Salva no LocalStorage (celular)
        localStorage.setItem('conquistas_vistas', JSON.stringify(novoHistorico));
        
        // Salva no Firebase (nuvem)
        novasNestaRodada.forEach(n => {
            database.ref('conquistas_vistas/' + n.id).set(true);
        });
        
        if (document.getElementById('modal-celebracao').style.display !== 'flex') {
            mostrarProximaConquistaDaFila();
        }
    }
}

    function converter(f) { 
        return new Promise(r => { 
            const rd = new FileReader(); 
            rd.readAsDataURL(f); 
            rd.onload = () => { 
                const img = new Image(); 
                img.src = rd.result; 
                img.onload = () => { 
                    const cv = document.createElement('canvas'); 
                    const ctx = cv.getContext('2d'); 
                    cv.width = 600; 
                    cv.height = 600 * (img.height/img.width); 
                    ctx.drawImage(img, 0, 0, cv.width, cv.height); 
                    r(cv.toDataURL('image/jpeg', 0.6)); 
                }; 
            }; 
        }); 
    }

    async function salvarViagem() {
        const elUf = document.getElementById('sel-uf'), elCidade = document.getElementById('txt-cidade'), elData = document.getElementById('txt-data'), elHosp = document.getElementById('v-hosp'), elTrans = document.getElementById('v-trans'), elAlime = document.getElementById('v-alime'), elAtrac = document.getElementById('v-atrac'), elFoto = document.getElementById('inp-foto'), elPraia = document.getElementById('chk-praia');
        if (!elCidade.value.trim()) return mostrarAlerta("Digite o nome da cidade.", "📍");
        if (!elData.value) return mostrarAlerta("Data é obrigatória.", "📅");
        const h = parseFloat(elHosp.value) || 0, t = parseFloat(elTrans.value) || 0, al = parseFloat(elAlime.value) || 0, at = parseFloat(elAtrac.value) || 0;
        const files = elFoto.files; let fotos = []; 
        for (let i = 0; i < Math.min(files.length, 3); i++) { fotos.push(await converter(files[i])); }
        const trip = { cidade: elCidade.value, uf: elUf.value, data: elData.value.split('-').reverse().join('/'), rawDate: elData.value, fotos, h, t, al, at, praia: elPraia.checked, total: h + t + al + at };
        database.ref('viagens/' + elUf.value).push(trip).then(() => {
            elCidade.value = ""; elData.value = ""; elHosp.value = ""; elTrans.value = ""; elAlime.value = ""; elAtrac.value = ""; elFoto.value = ""; elPraia.checked = false;
            mostrarAlerta("Memória salva!", "📌");
            trocarAba('mapa', document.querySelector('.btn-aba'));
        });
    }

    function abrirHistorico(idEstado) {

    const souEu = (uidSendoVisualizado === usuarioLogado.uid);

    // 2. Busca o perfil do dono do mapa para checar privacidade
    database.ref(`usuarios/${uidSendoVisualizado}/perfil`).once('value').then(snap => {
        const perfil = snap.val();
        if (!perfil) return;

        // 3. REGRA DE PRIVACIDADE:
        // Se não sou eu, e o perfil é "privado", verificamos se somos amigos
        if (!souEu && perfil.tipoPerfil === 'privado') {
            // listaMeusAmigos deve ser carregada no login (verificaremos isso na aba de busca)
            const somosAmigos = (typeof listaMeusAmigos !== 'undefined' && listaMeusAmigos.includes(uidSendoVisualizado));
            
            if (!somosAmigos) {
                mostrarAlerta("Este é um Viajante Local. Envie um convite para ver as memórias!", "🔒");
                return; // Bloqueia a execução e não abre o pop-up
            }
        }

        // 4. BUSCA OS DADOS DA VIAGEM (dbGlobal já está sincronizado pela função carregarPerfil)
        const listaObj = dbGlobal[idEstado]; 
        if (!listaObj) {
            // Se não houver viagem e for o meu perfil, posso sugerir adicionar
            if(souEu) mostrarAlerta("Nenhuma memória aqui ainda. Que tal registrar uma? 📸", "📍");
            return;
        }

        // 5. MONTAGEM DO HTML DO POP-UP
        let h = `<h2 style="color:var(--primary); margin:0 0 15px 10px; font-size:20px; font-weight:800;">🚩 ${idEstado.replace('BR','')}</h2>`;
        
        // Percorre todas as viagens registradas naquele estado
        Object.keys(listaObj).forEach((idFirebase) => {
            const v = listaObj[idFirebase];
            let track = ''; 
            let bullets = '';
            
            // Gerar Carrossel de Fotos se existirem
            if(v.fotos && v.fotos.length > 0) {
                v.fotos.forEach((f, idx) => { 
                    track += `<img src="${f}" class="img-slide" style="width:100%; height:300px; object-fit:cover;">`; 
                    bullets += `<div class="bullet-${idFirebase}" style="width:6px; height:6px; border-radius:50%; background:${idx===0?'white':'rgba(255,255,255,0.4)'}; transition:0.3s;"></div>`;
                });
            } else {
                track = `<div style="width:100%; height:300px; background:#f1f5f9; display:flex; align-items:center; justify-content:center; color:#cbd5e1;">Sem fotos</div>`;
            }

            // Template do Card de Viagem dentro do Pop-up
            h += `
                <div style="margin-bottom:20px; border-radius:24px; overflow:hidden; position:relative; background:#f1f5f9; box-shadow:0 10px 20px rgba(0,0,0,0.05);">
                    <div class="carousel-fotos" id="car-${idFirebase}" style="height:300px; position:relative;" ontouchstart="hTS(event)" ontouchmove="hTM(event, '${idFirebase}', ${v.fotos ? v.fotos.length : 0})">
                        <div class="track-fotos" style="display:flex; transition:0.4s ease-out; height:100%;">
                            ${track}
                        </div>
                        
                        <div style="position:absolute; bottom:0; left:0; width:100%; background:linear-gradient(to top, rgba(0,0,0,0.8), transparent); padding:15px; box-sizing:border-box; pointer-events:none;">
                            <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                                <div>
                                    <p style="margin:0; font-size:15px; font-weight:700; color:white;">${v.cidade}</p>
                                    <span style="font-size:10px; color:rgba(255,255,255,0.7); font-weight:600;">${v.data}</span>
                                </div>
                                <span style="color:#4ade80; font-weight:800; font-size:13px; background:rgba(0,0,0,0.3); padding:4px 8px; border-radius:8px;">
                                    ${v.total.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}
                                </span>
                            </div>
                            <div style="display:flex; justify-content:center; gap:5px; margin-top:10px;">
                                ${bullets}
                            </div>
                        </div>
                    </div>
                    
                    ${souEu ? `
                    <button onclick="removerViagem('${idEstado}', '${idFirebase}', '${v.cidade}')" 
                            style="position:absolute; top:10px; right:10px; background:rgba(255,255,255,0.2); border:none; color:white; width:30px; height:30px; border-radius:50%; font-size:12px; backdrop-filter:blur(5px); cursor:pointer;">
                        🗑️
                    </button>` : ''}
                </div>`;
        });

        // 6. EXIBIÇÃO FINAL
        document.getElementById('popup-content').innerHTML = h;
        document.getElementById('photo-popup').classList.add('show');
        document.getElementById('popup-overlay').style.display = 'block';
    });
}

    let sX = 0; function hTS(e) { sX = e.touches[0].clientX; }
    function hTM(e, idF, len) { 
        if (!sX) return; 
        let d = sX - e.touches[0].clientX; 
        let tr = document.querySelector(`#car-${idF} .track-fotos`); 
        let curIdx = Math.round(Math.abs(new WebKitCSSMatrix(window.getComputedStyle(tr).transform).m41 / tr.offsetWidth)); 
        if (Math.abs(d) > 40) { 
            if (d > 0 && curIdx < len - 1) curIdx++; else if (d < 0 && curIdx > 0) curIdx--; 
            tr.style.transform = `translateX(-${curIdx * 100}%)`; 
            document.querySelectorAll(`.bullet-${idF}`).forEach((b, i) => {
                b.style.background = (i === curIdx) ? 'white' : 'rgba(255,255,255,0.4)';
                b.style.transform = (i === curIdx) ? 'scale(1.2)' : 'scale(1)';
            });
            sX = 0; 
        } 
    }

    // Função de deslize específica para os carrosséis da Timeline
    function hTM_TL(e, idF, len) { 
    if (!sX) return; 
    let d = sX - e.touches[0].clientX; 
    let tr = document.querySelector(`#tl-car-${idF} .track-fotos`); 
    if(!tr) return;
    
    let curIdx = Math.round(Math.abs(new WebKitCSSMatrix(window.getComputedStyle(tr).transform).m41 / tr.offsetWidth)); 
    
    if (Math.abs(d) > 40) { 
        if (d > 0 && curIdx < len - 1) curIdx++; 
        else if (d < 0 && curIdx > 0) curIdx--; 
        
        tr.style.transform = `translateX(-${curIdx * 100}%)`; 
        document.querySelectorAll(`.bullet-tl-${idF}`).forEach((b, i) => {
            b.style.background = (i === curIdx) ? 'white' : 'rgba(255,255,255,0.4)';
        });
        sX = 0; 
    } 
}
        
    function atualizarInterface() { 
    document.querySelectorAll('path').forEach(p => p.classList.remove('visitado'));
    Object.keys(dbGlobal).forEach(u => { const el = document.getElementById(u); if(el) el.classList.add('visitado'); }); 
    document.getElementById('info').innerText = `ESTADOS CONQUISTADOS: ${Object.keys(dbGlobal).length}`; 
    }

    async function init() {
    // SEGURANÇA: Só inicia se o perfil social estiver carregado
    if (!usuarioLogado || !usuarioLogado.uid) {
        trocarAba('login', null);
        return;
    }

    try {
        // CARREGAMENTO DO MAPA (SVG)
        const res = await fetch('br.svg');
        const svg = await res.text();
        const container = document.getElementById('svg-container');
        container.innerHTML = svg;
        
        const svgEl = container.querySelector('svg');
        svgEl.id = "mapa-svg-real"; 
        svgEl.style.width = "100%"; 
        svgEl.style.height = "100%";

        // Inicializa o controle de Zoom e Pan
        controleMapa = svgPanZoom('#mapa-svg-real', { 
            zoomEnabled: true, 
            controlIconsEnabled: false, 
            fit: true, 
            center: true, 
            zoomScaleSensitivity: 0.3, 
            minZoom: 0.5, 
            maxZoom: 10 
        });

        // Evento de toque no mapa (Com trava para não disparar ao arrastar)
        let isDragging = false;
        container.addEventListener('touchstart', () => isDragging = false);
        container.addEventListener('touchmove', () => isDragging = true);
        container.addEventListener('touchend', (e) => {
            if (isDragging) return;
            const target = e.target.closest('path');
            if (target && target.id) abrirHistorico(target.id);
        });

        // Após carregar o mapa, carregamos o perfil do próprio usuário
        carregarPerfil(usuarioLogado.uid);

        // Interface: Mostra o menu e limpa as telas de entrada
        document.getElementById('menu-inferior').style.display = 'flex';
        document.getElementById('aba-login').style.display = 'none';
        document.getElementById('aba-cadastro').style.display = 'none';

    } catch (err) {
        console.error("Erro ao inicializar mapa:", err);
    }
}
    // ESCUTA AS VIAGENS
    database.ref('viagens').on('value', (snapshot) => {
        dbGlobal = snapshot.val() || {};
        atualizarInterface();
        verificarNovasConquistas(); 
        renderTimeline();
        renderGastos();
        renderJornada();
    });
}      
    init();
</script>
